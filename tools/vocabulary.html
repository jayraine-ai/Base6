<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/Base6/favicon.ico">
<title>Vocabulary — Base 6</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef8f4;
    --card: #ffffff;
    --teal: #007291;
    --teal-dark: #005a73;
    --teal-soft: #e6f5f8;
    --teal-border: #b0d8e4;
    --orange: #ef7724;
    --orange-dark: #c05a10;
    --orange-soft: #fff7f0;
    --orange-border: #f5c89a;
    --border: #e0d8d0;
    --ink: #1a1a1a;
    --muted: #555;
    --font-size: 16px;
    --line-height: 1.6;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: var(--font-size);
    line-height: var(--line-height);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background-color: var(--teal);
    padding: 1.5rem 2rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    color: #fef8f4;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.8;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .back-link:hover { opacity: 1; }
  .header-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fef8f4;
    flex: 1;
    text-align: center;
  }
  .header-spacer { width: 80px; }

  /* ── Banner ── */
  .banner {
    background-color: var(--orange);
    padding: 1rem 2rem;
    text-align: center;
  }
  .banner p {
    color: #fef8f4;
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
    max-width: 640px;
    margin: 0 auto;
  }

  /* ── Toolbar ── */
  .toolbar {
    position: sticky;
    top: 0;
    z-index: 20;
    background: rgba(254, 248, 244, 0.96);
    border-bottom: 2px solid var(--border);
    padding: 0.85rem 1.5rem;
    backdrop-filter: blur(6px);
  }
  .toolbar-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr auto;
    gap: 0.6rem;
    align-items: center;
  }
  .toolbar input,
  .toolbar select {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.92rem;
    background: var(--card);
    border: 2px solid var(--teal-border);
    border-radius: 10px;
    padding: 0.6rem 0.85rem;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    min-height: 42px;
  }
  .toolbar input:focus,
  .toolbar select:focus { border-color: var(--teal); }
  .toolbar input::placeholder { color: #aaa; }
  .reset-btn {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 0.6rem 1rem;
    color: var(--muted);
    cursor: pointer;
    min-height: 42px;
    transition: border-color 0.15s, color 0.15s;
    white-space: nowrap;
  }
  .reset-btn:hover { border-color: var(--orange); color: var(--orange-dark); }

  /* ── Main ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.75rem 1.5rem 4rem;
  }

  /* ── Controls row ── */
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .controls-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--teal);
    margin-right: 0.25rem;
  }
  .ctrl-btn {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    background: var(--teal-soft);
    border: 1.5px solid var(--teal-border);
    border-radius: 8px;
    padding: 0.4rem 0.9rem;
    color: var(--teal);
    cursor: pointer;
    min-height: 36px;
    transition: background 0.12s;
  }
  .ctrl-btn:hover { background: #c8e8f0; }
  .ctrl-btn.active { background: var(--teal); color: #fef8f4; border-color: var(--teal); }

  /* ── Stats ── */
  .stats-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .stat-pill {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 0.3rem 0.85rem;
    font-size: 0.82rem;
    color: var(--muted);
  }
  .stat-pill strong { color: var(--ink); }

  /* ── Alphabet strip ── */
  .alpha-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-bottom: 1.5rem;
  }
  .alpha-btn {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.55rem;
    color: var(--muted);
    cursor: pointer;
    min-width: 32px;
    min-height: 32px;
    text-align: center;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .alpha-btn:hover { border-color: var(--teal); color: var(--teal); }
  .alpha-btn.active { background: var(--teal); color: #fef8f4; border-color: var(--teal); }

  /* ── Quiz / Word of the moment ── */
  .quiz-section {
    background: var(--orange-soft);
    border: 2px solid var(--orange);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 2rem;
  }
  .quiz-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--orange-dark);
    margin-bottom: 0.6rem;
    display: block;
  }
  .quiz-prompt {
    font-size: 1rem;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 0.85rem;
    min-height: 1.5em;
  }
  .quiz-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .quiz-btn {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    border-radius: 10px;
    padding: 0.5rem 1rem;
    cursor: pointer;
    min-height: 38px;
    border: none;
    transition: background 0.12s, transform 0.1s;
  }
  .quiz-btn:active { transform: scale(0.97); }
  .quiz-btn.primary { background: var(--orange); color: #fef8f4; }
  .quiz-btn.primary:hover { background: var(--orange-dark); }
  .quiz-btn.secondary { background: var(--card); border: 1.5px solid var(--orange-border); color: var(--orange-dark); }
  .quiz-btn.secondary:hover { background: #fde8d0; }
  .quiz-answer {
    margin-top: 0.75rem;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--teal-dark);
    display: none;
  }

  /* ── Cards grid ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }

  /* ── Vocabulary card ── */
  .vocab-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-left: 5px solid var(--teal);
    border-radius: 14px;
    padding: 1.1rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 0.5rem;
  }
  .card-term {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--teal);
    line-height: 1.25;
  }
  .card-letter {
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--teal-soft);
    color: var(--teal);
    border: 1px solid var(--teal-border);
    border-radius: 20px;
    padding: 2px 8px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .card-badges {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  .badge {
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--muted);
  }
  .badge.subject { background: var(--teal-soft); border-color: var(--teal-border); color: var(--teal-dark); }
  .badge.tag { background: var(--orange-soft); border-color: var(--orange-border); color: var(--orange-dark); }

  .card-meaning {
    font-size: 0.92rem;
    color: var(--ink);
    line-height: 1.6;
  }
  .card-meaning strong {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 0.2rem;
  }

  .card-example {
    font-size: 0.88rem;
    color: var(--muted);
    line-height: 1.6;
    border-left: 4px solid var(--orange);
    padding-left: 0.75rem;
  }
  .card-example strong {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--orange-dark);
    margin-bottom: 0.2rem;
  }

  .card-prompt {
    font-size: 0.85rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 0.6rem 0.75rem;
    line-height: 1.5;
  }
  .card-prompt strong {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.2rem;
  }

  .card-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 0.25rem;
  }
  .card-btn {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 8px;
    padding: 0.35rem 0.75rem;
    cursor: pointer;
    min-height: 34px;
    transition: background 0.12s;
  }
  .card-btn.read {
    background: var(--teal-soft);
    border: 1.5px solid var(--teal-border);
    color: var(--teal-dark);
  }
  .card-btn.read:hover { background: #c8e8f0; }

  /* examples hidden */
  body.hide-examples .card-example { display: none; }

  /* ── Empty state ── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
  }
  .empty-state p { font-size: 1rem; margin-bottom: 0.5rem; }
  .empty-state button {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    background: var(--teal);
    color: #fef8f4;
    border: none;
    border-radius: 10px;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    margin-top: 0.75rem;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8rem;
    color: #888;
    border-top: 1px solid var(--border);
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .toolbar-inner { grid-template-columns: 1fr 1fr; }
    .toolbar-inner input { grid-column: 1 / -1; }
    .site-header { padding: 1.25rem 1rem; }
    .header-spacer { display: none; }
    .main { padding: 1.25rem 1rem 3rem; }
  }
  @media (max-width: 420px) {
    .toolbar-inner { grid-template-columns: 1fr; }
  }

  @media print {
    .toolbar, .controls-row, .alpha-strip, .quiz-section, .card-actions, .back-link { display: none !important; }
    body { background: white; }
    .vocab-card { break-inside: avoid; border-left-width: 3px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }

  button:focus-visible, input:focus-visible, select:focus-visible {
    outline: 3px solid var(--orange);
    outline-offset: 2px;
  }
</style>
</head>

<header class="site-header">

  <h1 class="header-title">Vocabulary</h1>
  <div class="header-spacer"></div>
</header>

<div class="banner">

</div>

<nav class="toolbar" aria-label="Search and filter">

    <select id="subject" aria-label="Filter by subject">

</nav>

<main class="main">

    <button class="ctrl-btn" id="smallerText" type="button">Smaller text</button>
    <button class="ctrl-btn" id="toggleExamples" type="button">Hide examples</button>
  </div>

  <div class="stats-row" aria-live="polite">
    <div class="stat-pill"><strong id="visibleCount">0</strong> words showing</div>
    <div class="stat-pill"><strong>130</strong> total entries</div>
    <div class="stat-pill"><strong>10</strong> curriculum areas</div>
  </div>

  <div class="alpha-strip" id="alpha" aria-label="Filter by first letter" role="group"></div>

  <section class="quiz-section" aria-label="Word of the moment">
    <span class="quiz-label">Word of the moment</span>
    <p class="quiz-prompt" id="quizPrompt">Press "Pick a word" whenever you feel like it.</p>
    <div class="quiz-actions">
      <button class="quiz-btn primary" id="newQuiz" type="button">Pick a word</button>
      <button class="quiz-btn secondary" id="showAnswer" type="button">Show the answer</button>
      <button class="quiz-btn secondary" id="hearQuiz" type="button">Read it aloud</button>
    </div>
    <p class="quiz-answer" id="quizAnswer"></p>
  </section>

  <section class="cards-grid" id="cards" aria-live="polite" aria-label="Vocabulary cards"></section>

</main>

<footer>Base 6 · Chilton Bridge School</footer>

/* ── Read aloud ── */
let activeBtn = null;

function speak(text, btn) {
  if (activeBtn && activeBtn !== btn) {
    activeBtn.textContent = '🔊 Read aloud';
    activeBtn.disabled = false;
  }
  activeBtn = btn || null;

  if (!('speechSynthesis' in window)) {
    if (btn) btn.textContent = '🔊 Not supported';
    return;
  }

  speechSynthesis.cancel();

  function doSpeak() {
    const u = new SpeechSynthesisUtterance(text);
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (enVoice) u.voice = enVoice;
    u.rate = 0.88;
    u.pitch = 1;
    u.volume = 1;
    u.onstart = () => { if (btn) btn.textContent = '⏸ Speaking…'; };
    u.onend = () => {
      if (btn) { btn.textContent = '🔊 Read aloud'; btn.disabled = false; }
      activeBtn = null;
    };
    u.onerror = (e) => {
      if (btn) { btn.textContent = '🔊 Read aloud'; btn.disabled = false; }
      activeBtn = null;
      if (e.error !== 'interrupted') console.warn('Speech error:', e.error);
    };
    if (btn) btn.disabled = true;
    speechSynthesis.speak(u);
  }

  const voices = speechSynthesis.getVoices();
  if (voices.length > 0) {
    setTimeout(doSpeak, 50);
  } else {
    speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.onvoiceschanged = null;
      setTimeout(doSpeak, 50);
    };
  }
}

/* ── Safety escape ── */
function esc(str) {
  return String(str || '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}

/* ── Filtered pool ── */
function pool() {
  const q  = searchEl.value.trim().toLowerCase();
  const s  = subjectEl.value;
  const st = strandEl.value;
  return entries.filter(e => {
    const text = `${e.term} ${e.definition} ${e.example} ${e.subject} ${e.strand} ${e.tag}`.toLowerCase();
    return (!q || text.includes(q))
      && (!s  || e.subject === s)
      && (!st || e.strand  === st)
      && (!letterFilter || e.term[0].toUpperCase() === letterFilter);
  }).sort((a, b) => a.term.localeCompare(b.term));
}

/* ── Render cards ── */
function render() {
  const filtered = pool();
  cardsEl.innerHTML = '';
  countEl.textContent = filtered.length;

  if (filtered.length === 0) {
    cardsEl.innerHTML = `<div class="empty-state">
      <p>No words match that search.</p>
      <button onclick="resetAll()">Clear filters</button>
    </div>`;
    return;
  }

  filtered.forEach(e => {
    const card = document.createElement('article');
    card.className = 'vocab-card';
    card.innerHTML = `
      <div class="card-top">
        <h2 class="card-term">${esc(e.term)}</h2>
        <span class="card-letter">${esc(e.first_letter)}</span>
      </div>
      <div class="card-badges">
        <span class="badge subject">${esc(e.subject)}</span>
        <span class="badge">${esc(e.strand)}</span>
        <span class="badge tag">${esc(e.tag)}</span>
      </div>
      <div class="card-meaning"><strong>Meaning</strong>${esc(e.short_meaning || e.definition)}</div>
      <div class="card-example"><strong>Example</strong>${esc(e.example)}</div>
      <div class="card-prompt"><strong>Try it</strong>${esc(e.practice_prompt)}</div>
      <div class="card-actions">
        <button class="card-btn read" type="button">🔊 Read aloud</button>
      </div>`;
    card.querySelector('.read').addEventListener('click', function() {
      speak(`${e.term}. Meaning. ${e.definition} Example. ${e.example}`, this);
    });
    cardsEl.appendChild(card);
  });
}

/* ── Alphabet strip ── */
function buildAlpha() {
  const allBtn = document.createElement('button');
  allBtn.className = 'alpha-btn active';
  allBtn.textContent = 'All';
  allBtn.setAttribute('aria-label', 'Show all letters');
  allBtn.addEventListener('click', () => { letterFilter = ''; updateAlpha(allBtn); render(); });
  alphaEl.appendChild(allBtn);

  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'alpha-btn';
    btn.textContent = l;
    btn.setAttribute('aria-label', `Show words starting with ${l}`);
    btn.addEventListener('click', () => { letterFilter = l; updateAlpha(btn); render(); });
    alphaEl.appendChild(btn);
  });
}

function updateAlpha(active) {
  alphaEl.querySelectorAll('.alpha-btn').forEach(b => b.classList.remove('active'));
  active.classList.add('active');
}

/* ── Quiz ── */
function newQuiz() {
  const p = pool().length ? pool() : entries;
  currentQuiz = p[Math.floor(Math.random() * p.length)];
  quizPrompt.textContent = `Which word means: "${currentQuiz.short_meaning || currentQuiz.definition}"`;
  quizAnswer.style.display = 'none';
  quizAnswer.textContent = '';
}

document.getElementById('newQuiz').addEventListener('click', newQuiz);
document.getElementById('showAnswer').addEventListener('click', () => {
  if (!currentQuiz) { newQuiz(); return; }
  quizAnswer.textContent = `${currentQuiz.term} — ${currentQuiz.example}`;
  quizAnswer.style.display = 'block';
});
document.getElementById('hearQuiz').addEventListener('click', function() {
  speak(quizPrompt.textContent, this);
});

/* ── Controls ── */
document.getElementById('biggerText').addEventListener('click', () => {
  fontSize = Math.min(22, fontSize + 2);
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
});
document.getElementById('smallerText').addEventListener('click', () => {
  fontSize = Math.max(14, fontSize - 2);
  document.documentElement.style.setProperty('--font-size', fontSize + 'px');
});
document.getElementById('toggleExamples').addEventListener('click', function () {
  examplesHidden = !examplesHidden;
  document.body.classList.toggle('hide-examples', examplesHidden);
  this.textContent = examplesHidden ? 'Show examples' : 'Hide examples';
  this.classList.toggle('active', examplesHidden);
});

/* ── Reset ── */
function resetAll() {
  searchEl.value = '';
  subjectEl.value = '';
  strandEl.value = '';
  letterFilter = '';
  updateAlpha(alphaEl.querySelector('.alpha-btn'));
  render();
}
document.getElementById('reset').addEventListener('click', resetAll);

/* ── Live filter ── */
[searchEl, subjectEl, strandEl].forEach(el => el.addEventListener('input', render));

/* ── Init ── */
buildAlpha();
render();
</script>
</body>
