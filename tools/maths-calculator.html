<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/Base6/favicon.ico">
<title>Maths Calculator — Base 6</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Atkinson Hyperlegible', sans-serif;
    background-color: #fef8f4;
    color: #1a1a1a;
    min-height: 100vh;
  }

  /* ── Header ── */
  .site-header {
    background-color: #007291;
    padding: 1.5rem 2rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }
  .back-link {
    color: #fef8f4;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.8;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .back-link:hover { opacity: 1; }
  .header-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fef8f4;
    flex: 1;
    text-align: center;
  }
  .header-spacer { width: 80px; }

  /* ── Banner ── */
  .banner {
    background-color: #ef7724;
    padding: 1rem 2rem;
    text-align: center;
  }
  .banner p {
    color: #fef8f4;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.5;
    max-width: 600px;
    margin: 0 auto;
  }

  /* ── Main ── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* ── Problem input ── */
  .input-section {
    background: #fff;
    border: 2px solid #007291;
    border-radius: 16px;
    padding: 1.75rem;
    margin-bottom: 1.5rem;
  }
  .input-label {
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #007291;
    display: block;
    margin-bottom: 0.75rem;
  }
  .input-row {
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }
  #problem-input {
    flex: 1;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 1.05rem;
    background: #fef8f4;
    border: 2px solid #c8e6ed;
    border-radius: 10px;
    padding: 0.85rem 1rem;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
    resize: none;
    min-height: 56px;
  }
  #problem-input:focus { border-color: #007291; }
  #problem-input::placeholder { color: #aaa; }
  .go-btn {
    background-color: #007291;
    color: #fef8f4;
    border: none;
    border-radius: 10px;
    padding: 0 1.5rem;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
    white-space: nowrap;
    min-width: 90px;
  }
  .go-btn:hover { background-color: #005a73; }
  .go-btn:active { transform: scale(0.97); }
  .go-btn:disabled { background-color: #a0c8d4; cursor: default; }

  /* ── Example chips ── */
  .examples-label {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #888;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
    display: block;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .chip {
    background: #e6f5f8;
    border: 1.5px solid #b0d8e4;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.85rem;
    font-weight: 700;
    color: #007291;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    font-family: 'Atkinson Hyperlegible', sans-serif;
  }
  .chip:hover { background: #c8e8f0; transform: translateY(-1px); }
  .chip:disabled { opacity: 0.4; pointer-events: none; }

  /* ── Loading ── */
  #loading {
    display: none;
    text-align: center;
    padding: 2rem;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #c8e8f0;
    border-top-color: #007291;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 0.75rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { color: #007291; font-weight: 700; font-size: 0.9rem; }

  /* ── Conversation thread ── */
  #thread {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  /* Step card (revealed steps) */
  .step-card {
    background: #fff;
    border: 2px solid #e0d8d0;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    display: grid;
    grid-template-columns: 2.2rem 1fr;
    gap: 0.4rem 0.9rem;
    align-items: start;
    animation: fadeUp 0.25s ease both;
  }
  .step-card.correct-bg { border-color: #a8d8a8; background: #f4fbf4; }
  .step-card.complete-bg { border-color: #007291; background: #e6f5f8; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .step-num {
    width: 2.2rem;
    height: 2.2rem;
    background: #ef7724;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.95rem;
    font-weight: 700;
    color: #fef8f4;
    flex-shrink: 0;
    margin-top: 0.1rem;
  }
  .step-num.done { background: #007291; }
  .step-num.star { background: #ef7724; font-size: 1rem; }

  .step-body {}
  .step-label {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #ef7724;
    margin-bottom: 0.25rem;
  }
  .step-label.done-label { color: #007291; }
  .step-working {
    font-size: 1.05rem;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 0.3rem;
  }
  .step-explanation {
    font-size: 0.92rem;
    color: #444;
    line-height: 1.6;
  }

  /* Student attempt feedback */
  .attempt-record {
    font-size: 0.85rem;
    color: #666;
    margin-top: 0.4rem;
    padding-top: 0.4rem;
    border-top: 1px solid #e8e0d8;
  }
  .attempt-record span { font-weight: 700; color: #007291; }

  /* ── Prompt card (current question to student) ── */
  .prompt-card {
    background: #fff7f0;
    border: 2px solid #ef7724;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    animation: fadeUp 0.25s ease both;
  }
  .prompt-question {
    font-size: 1rem;
    font-weight: 700;
    color: #c05a10;
    line-height: 1.5;
    margin-bottom: 1rem;
  }
  .prompt-input-row {
    display: flex;
    gap: 0.6rem;
  }
  .prompt-input {
    flex: 1;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 1rem;
    background: #fef8f4;
    border: 2px solid #f5c89a;
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    color: #1a1a1a;
    outline: none;
    transition: border-color 0.15s;
  }
  .prompt-input:focus { border-color: #ef7724; }
  .prompt-input::placeholder { color: #bbb; }
  .submit-btn {
    background-color: #ef7724;
    color: #fef8f4;
    border: none;
    border-radius: 10px;
    padding: 0 1.2rem;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background-color 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .submit-btn:hover { background-color: #c05a10; }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { background-color: #f5c89a; cursor: default; }

  /* ── Finish card ── */
  .finish-card {
    background: #007291;
    border-radius: 16px;
    padding: 1.5rem 1.75rem;
    animation: fadeUp 0.3s ease both;
  }
  .finish-title {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fef8f4;
    margin-bottom: 0.3rem;
  }
  .finish-answer {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fef8f4;
    margin-bottom: 0.75rem;
  }
  .finish-tip {
    font-size: 0.9rem;
    color: #a8d8e4;
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }

  /* Email + restart */
  .finish-actions {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    padding-top: 1rem;
    border-top: 1.5px solid rgba(255,255,255,0.2);
  }
  .email-btn {
    background: #fef8f4;
    border: none;
    border-radius: 10px;
    padding: 0.65rem 1.1rem;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: #007291;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.12s;
  }
  .email-btn:hover { background: #e6f5f8; }
  .restart-btn {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.4);
    border-radius: 10px;
    padding: 0.65rem 1.1rem;
    font-family: 'Atkinson Hyperlegible', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: #fef8f4;
    cursor: pointer;
    transition: background 0.12s;
  }
  .restart-btn:hover { background: rgba(255,255,255,0.25); }

  /* Error */
  .error-box {
    background: #fff0f0;
    border: 2px solid #e05555;
    border-radius: 14px;
    padding: 1.25rem 1.5rem;
    color: #8b0000;
    font-size: 0.95rem;
    line-height: 1.6;
  }

  footer {
    text-align: center;
    padding: 1.5rem;
    font-size: 0.8rem;
    color: #888;
    border-top: 1px solid #e0d8d0;
    margin-top: 2rem;
  }

  @media (max-width: 500px) {
    .input-row { flex-direction: column; }
    .go-btn { padding: 0.75rem; width: 100%; }
    .prompt-input-row { flex-direction: column; }
    .submit-btn { padding: 0.7rem; }
    .finish-actions { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="/Base6/index.html">← Base 6</a>
  <h1 class="header-title">Maths Calculator</h1>
  <div class="header-spacer"></div>
</header>

<div class="banner">
  <p>Work through maths one step at a time — you figure it out, it guides you.</p>
</div>

<main class="main">

  <div class="input-section" id="input-section">
    <label class="input-label" for="problem-input">What do you want to work out?</label>
    <div class="input-row">
      <textarea
        id="problem-input"
        placeholder="e.g.  48 ÷ 6   or   what is 15% of 80   or   area of a rectangle 9cm by 4cm"
        rows="2"
      ></textarea>
      <button class="go-btn" id="go-btn" onclick="startProblem()">Let's go</button>
    </div>
    <span class="examples-label">Try one of these</span>
    <div class="chips" id="chips"></div>
  </div>

  <div id="loading"><div class="spinner"></div><p>Thinking...</p></div>

  <div id="thread"></div>

</main>

<footer>Base 6 · Chilton Bridge School</footer>

<script>
/* ── State ── */
let state = {
  problem: '',
  conversationHistory: [],  // [{role, content}] sent to API
  stepIndex: 0,
  completedSteps: [],       // {stepNum, label, working, explanation, studentAttempt}
  finalAnswer: '',
  tip: '',
  done: false
};

/* ── Examples ── */
const EXAMPLES = [
  "36 ÷ 4",
  "17 × 8",
  "What is 20% of 150?",
  "¾ + ½",
  "Area of a rectangle 7cm by 5cm",
  "5² + 3²",
  "Convert 0.6 to a fraction",
  "Round 3.847 to 1 decimal place",
  "Mean of 4, 7, 9, 10, 10",
  "Perimeter of a square with sides of 9cm",
];

const chipsEl = document.getElementById('chips');
EXAMPLES.forEach(ex => {
  const btn = document.createElement('button');
  btn.className = 'chip';
  btn.textContent = ex;
  btn.onclick = () => {
    document.getElementById('problem-input').value = ex;
    startProblem();
  };
  chipsEl.appendChild(btn);
});

document.getElementById('problem-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); startProblem(); }
});

/* ── System prompt ── */
const SYSTEM = `You are a patient, friendly maths tutor helping secondary school students aged 11–16. Many students have ADHD, dyslexia, or autism. You guide students through maths problems one small step at a time — you never give away the answer, you help them find it.

VERY IMPORTANT RULES:
- Break every problem into SHORT steps (no more than 2–3 lines of working each).
- Never combine multiple operations into one step.
- Keep steps small enough for a student with ADHD to hold in working memory.
- Never use italics. Never use bullet points in explanations. Write in plain, warm English.
- Do not add praise filler like "great job" or "well done".

You communicate by responding with a JSON object ONLY. No markdown fences, no preamble, no text outside the JSON.

FLOW:

When the student sends a problem, respond with:
{
  "type": "step",
  "stepNumber": 1,
  "label": "short step label (3–5 words)",
  "working": "show the maths clearly",
  "explanation": "one or two plain sentences explaining what to do and why",
  "question": "a short question asking the student what they think the answer to the NEXT step will be — keep it concrete and specific",
  "isLast": false
}

When the student replies with their attempt at a step, evaluate it and respond with:
{
  "type": "step",
  "stepNumber": <next number>,
  "label": "short step label",
  "working": "show the maths for this step",
  "explanation": "one or two plain sentences",
  "question": "question for the NEXT step (or omit if isLast is true)",
  "feedback": "brief, warm, honest response to their attempt — say if they were right, close, or off track, and why — one sentence max",
  "isLast": false
}

When the final step is reached, set "isLast": true and add:
{
  "type": "step",
  "stepNumber": <n>,
  "label": "label",
  "working": "final working",
  "explanation": "explanation",
  "feedback": "response to their attempt if applicable",
  "isLast": true,
  "finalAnswer": "the complete final answer as a short string",
  "tip": "one memorable tip or related maths fact — one sentence, optional"
}

Keep steps SHORT. A 4-step problem is better than a 2-step one. Never skip working.`;

/* ── Start ── */
async function startProblem() {
  const input = document.getElementById('problem-input').value.trim();
  if (!input) return;

  state = {
    problem: input,
    conversationHistory: [],
    stepIndex: 0,
    completedSteps: [],
    finalAnswer: '',
    tip: '',
    done: false
  };

  lockInput(true);
  document.getElementById('thread').innerHTML = '';
  setLoading(true);

  state.conversationHistory.push({ role: 'user', content: input });

  await fetchNextStep(null);
}

/* ── Student submits an attempt ── */
async function submitAttempt() {
  const inputEl = document.getElementById('attempt-input');
  if (!inputEl) return;
  const attempt = inputEl.value.trim();
  if (!attempt) return;

  // Disable prompt while waiting
  inputEl.disabled = true;
  document.getElementById('submit-btn').disabled = true;

  // Record the attempt against the last step
  const lastStep = state.completedSteps[state.completedSteps.length - 1];
  if (lastStep) lastStep.studentAttempt = attempt;

  // Add to conversation
  state.conversationHistory.push({ role: 'user', content: attempt });

  // Remove the prompt card
  const promptCard = document.getElementById('prompt-card');
  if (promptCard) promptCard.remove();

  setLoading(true);
  await fetchNextStep(attempt);
}

/* ── API call ── */
async function fetchNextStep(studentAttempt) {
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        system: SYSTEM,
        messages: state.conversationHistory
      })
    });

    const data = await response.json();
    const raw = (data.content || []).map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    // Add assistant reply to history
    state.conversationHistory.push({ role: 'assistant', content: raw });

    setLoading(false);
    handleStepResponse(parsed, studentAttempt);

  } catch(err) {
    setLoading(false);
    appendError();
  }
}

/* ── Render a step ── */
function handleStepResponse(step, studentAttempt) {
  state.stepIndex++;

  const record = {
    stepNum: step.stepNumber,
    label: step.label,
    working: step.working,
    explanation: step.explanation,
    studentAttempt: studentAttempt || null,
    feedback: step.feedback || null
  };
  state.completedSteps.push(record);

  // Render the step card
  const thread = document.getElementById('thread');
  const card = document.createElement('div');
  card.className = 'step-card' + (step.isLast ? ' complete-bg' : '');

  const numEl = document.createElement('div');
  numEl.className = 'step-num' + (step.isLast ? ' star' : ' done');
  numEl.textContent = step.isLast ? '★' : step.stepNumber;

  const body = document.createElement('div');
  body.className = 'step-body';

  let inner = `<div class="step-label ${step.isLast ? 'done-label' : ''}">${esc(step.label)}</div>
    <div class="step-working">${esc(step.working)}</div>
    <div class="step-explanation">${esc(step.explanation)}</div>`;

  if (step.feedback && studentAttempt) {
    inner += `<div class="attempt-record">You said: <span>${esc(studentAttempt)}</span> — ${esc(step.feedback)}</div>`;
  }

  body.innerHTML = inner;
  card.appendChild(numEl);
  card.appendChild(body);
  thread.appendChild(card);

  if (step.isLast) {
    state.done = true;
    state.finalAnswer = step.finalAnswer || '';
    state.tip = step.tip || '';
    renderFinish();
  } else {
    renderPrompt(step.question);
  }

  // Scroll latest into view
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Prompt card ── */
function renderPrompt(question) {
  const thread = document.getElementById('thread');
  const card = document.createElement('div');
  card.className = 'prompt-card';
  card.id = 'prompt-card';

  card.innerHTML = `
    <div class="prompt-question">${esc(question)}</div>
    <div class="prompt-input-row">
      <input
        class="prompt-input"
        id="attempt-input"
        type="text"
        placeholder="Type your answer here..."
        autocomplete="off"
      />
      <button class="submit-btn" id="submit-btn" onclick="submitAttempt()">Check</button>
    </div>`;

  thread.appendChild(card);

  // Focus and enter key
  setTimeout(() => {
    const inp = document.getElementById('attempt-input');
    if (inp) {
      inp.focus();
      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') submitAttempt();
      });
    }
  }, 100);

  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Finish card ── */
function renderFinish() {
  const thread = document.getElementById('thread');
  const card = document.createElement('div');
  card.className = 'finish-card';

  const gmailUrl = buildGmailUrl();

  card.innerHTML = `
    <div class="finish-title">Final answer</div>
    <div class="finish-answer">${esc(state.finalAnswer)}</div>
    ${state.tip ? `<div class="finish-tip">💡 ${esc(state.tip)}</div>` : ''}
    <div class="finish-actions">
      <a class="email-btn" href="${gmailUrl}" target="_blank">📧 Send working to Jay</a>
      <button class="restart-btn" onclick="resetAll()">Try another problem</button>
    </div>`;

  thread.appendChild(card);
  card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

/* ── Gmail URL ── */
function buildGmailUrl() {
  let body = `Hi Jay,\n\nHere is the maths I worked through today.\n\nProblem: ${state.problem}\nAnswer: ${state.finalAnswer}\n\nSteps:\n`;

  state.completedSteps.forEach(s => {
    body += `\nStep ${s.stepNum}: ${s.label}\n${s.working}\n${s.explanation}`;
    if (s.studentAttempt) {
      body += `\nMy attempt: ${s.studentAttempt}`;
      if (s.feedback) body += ` — ${s.feedback}`;
    }
    body += '\n';
  });

  if (state.tip) body += `\nTip: ${state.tip}\n`;

  return `https://mail.google.com/mail/?view=cm&to=jay.raine@chiltonbridgeschool.co.uk&su=${encodeURIComponent('Maths: ' + state.problem)}&body=${encodeURIComponent(body)}`;
}

/* ── Reset ── */
function resetAll() {
  state = { problem: '', conversationHistory: [], stepIndex: 0, completedSteps: [], finalAnswer: '', tip: '', done: false };
  document.getElementById('thread').innerHTML = '';
  lockInput(false);
  document.getElementById('problem-input').value = '';
  document.getElementById('problem-input').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── Helpers ── */
function setLoading(on) {
  document.getElementById('loading').style.display = on ? 'block' : 'none';
}

function lockInput(on) {
  document.getElementById('problem-input').disabled = on;
  document.getElementById('go-btn').disabled = on;
  document.querySelectorAll('.chip').forEach(c => c.disabled = on);
}

function appendError() {
  const thread = document.getElementById('thread');
  const el = document.createElement('div');
  el.className = 'error-box';
  el.textContent = 'Something went wrong — check your connection and try again.';
  thread.appendChild(el);
  lockInput(false);
}

function esc(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
</script>
</body>
</html>
