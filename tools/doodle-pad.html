<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Pad · Base 6</title>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Atkinson Hyperlegible', sans-serif; background-color: #fef8f4; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }
  .site-header { background-color: #007291; padding: 1.25rem 2rem; display: flex; align-items: center; gap: 1rem; flex-shrink: 0; }
  .back-link { color: #fef8f4; font-size: 0.9rem; font-weight: 700; text-decoration: none; opacity: 0.85; }
  .back-link:hover { opacity: 1; }
  .header-title { color: #fef8f4; font-size: 1rem; font-weight: 700; }
  .toolbar { background: #fff; border-bottom: 1.5px solid #e0d8d0; padding: 0.65rem 1.25rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  .tool-group { display: flex; align-items: center; gap: 6px; }
  .divider { width: 1px; height: 28px; background: #e0d8d0; flex-shrink: 0; }
  .tool-btn { width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid #e0d8d0; background: #fef8f4; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; transition: background 0.12s, border-color 0.12s; flex-shrink: 0; }
  .tool-btn:hover { background: #e6f5f8; border-color: #007291; }
  .tool-btn.active { background: #e6f5f8; border-color: #007291; border-width: 2px; }
  .tool-btn.eraser-active { background: #fff3e8; border-color: #ef7724; border-width: 2px; }
  .col-btn { width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid #ccc; cursor: pointer; flex-shrink: 0; transition: transform 0.1s, box-shadow 0.1s; }
  .col-btn:hover { transform: scale(1.15); }
  .col-btn.active { box-shadow: 0 0 0 3px #fef8f4, 0 0 0 5px #007291; }
  .col-btn.white { border-color: #aaa; }
  .size-label { font-size: 0.75rem; color: #888; font-weight: 700; white-space: nowrap; }
  input[type=range] { width: 80px; accent-color: #007291; }
  .size-preview { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .size-dot { border-radius: 50%; background: #1a1a1a; transition: width 0.1s, height 0.1s; }
  .canvas-wrap { flex: 1; display: flex; align-items: stretch; padding: 1rem; min-height: 0; }
  canvas { display: block; width: 100%; height: 100%; border-radius: 12px; border: 1.5px solid #e0d8d0; background: #ffffff; cursor: crosshair; touch-action: none; }
  .bottom-bar { background: #fff; border-top: 1.5px solid #e0d8d0; padding: 0.6rem 1.25rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .bottom-bar p { font-size: 0.78rem; color: #aaa; }
  .bottom-actions { display: flex; gap: 8px; }
  .action-btn { font-family: 'Atkinson Hyperlegible', sans-serif; font-size: 0.82rem; font-weight: 700; border-radius: 8px; padding: 0.4rem 0.9rem; cursor: pointer; transition: background 0.12s; border: 1.5px solid; }
  .action-btn.clear { background: #fdecea; color: #c0392b; border-color: #f5c0bb; }
  .action-btn.clear:hover { background: #fad4d0; }
  .action-btn.save { background: #007291; color: #fff; border-color: #007291; }
  .action-btn.save:hover { background: #005a73; }
</style>
</head>
<body>

<header class="site-header">
  <a class="back-link" href="../index.html">← Home</a>
  <span class="header-title">🎨 Doodle Pad</span>
</header>

<div class="toolbar" role="toolbar" aria-label="Drawing tools">

  <div class="tool-group">
    <button class="tool-btn active" id="btn-pen" onclick="setTool('pen')" title="Pen" aria-label="Pen" aria-pressed="true">✏️</button>
    <button class="tool-btn" id="btn-eraser" onclick="setTool('eraser')" title="Eraser" aria-label="Eraser" aria-pressed="false">🧹</button>
  </div>

  <div class="divider"></div>

  <div class="tool-group" id="colour-btns" role="group" aria-label="Colours"></div>

  <div class="divider"></div>

  <div class="tool-group">
    <span class="size-label">Size</span>
    <input type="range" min="1" max="30" value="4" step="1" id="size-slider" aria-label="Brush size" oninput="updateSize(this.value)">
    <div class="size-preview"><div class="size-dot" id="size-dot" style="width:4px;height:4px;"></div></div>
  </div>

  <div class="divider"></div>

  <div class="tool-group">
    <button class="tool-btn" onclick="undoLast()" title="Undo" aria-label="Undo last stroke">↩️</button>
  </div>

</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="bottom-bar">
  <p>Just draw — no rules.</p>
  <div class="bottom-actions">
    <button class="action-btn clear" onclick="clearCanvas()">Clear</button>
    <button class="action-btn save" onclick="saveCanvas()">Save as image ↓</button>
  </div>
</div>

<script>
  const COLOURS = [
    { hex: '#1a1a1a', label: 'Black' },
    { hex: '#c0392b', label: 'Red' },
    { hex: '#ef7724', label: 'Orange' },
    { hex: '#f0c020', label: 'Yellow' },
    { hex: '#2e8b57', label: 'Green' },
    { hex: '#007291', label: 'Teal' },
    { hex: '#7a3fa8', label: 'Purple' },
    { hex: '#e91e8c', label: 'Pink' },
    { hex: '#888888', label: 'Grey' },
    { hex: '#ffffff', label: 'White' },
  ];

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let tool = 'pen', colour = '#1a1a1a', size = 4;
  let drawing = false, history = [], currentStroke = null;

  function resizeCanvas() {
    const wrap = canvas.parentElement;
    const dpr = window.devicePixelRatio || 1;
    const w = wrap.clientWidth - 32;
    const h = wrap.clientHeight - 32;
    const snapshot = ctx.getImageData(0, 0, canvas.width, canvas.height);
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.scale(dpr, dpr);
    redrawAll();
  }

  function setTool(t) {
    tool = t;
    canvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
    document.getElementById('btn-pen').className = 'tool-btn' + (t === 'pen' ? ' active' : '');
    document.getElementById('btn-pen').setAttribute('aria-pressed', t === 'pen');
    document.getElementById('btn-eraser').className = 'tool-btn' + (t === 'eraser' ? ' eraser-active' : '');
    document.getElementById('btn-eraser').setAttribute('aria-pressed', t === 'eraser');
  }

  function setColour(c) {
    colour = c;
    if (tool === 'eraser') setTool('pen');
    document.querySelectorAll('.col-btn').forEach(b => b.classList.toggle('active', b.dataset.hex === c));
    document.getElementById('size-dot').style.background = c === '#ffffff' ? '#ccc' : c;
  }

  function updateSize(v) {
    size = parseInt(v);
    const px = Math.max(2, Math.min(20, size));
    document.getElementById('size-dot').style.width = px + 'px';
    document.getElementById('size-dot').style.height = px + 'px';
  }

  // Build colour buttons
  const cBtns = document.getElementById('colour-btns');
  COLOURS.forEach(c => {
    const b = document.createElement('button');
    b.className = 'col-btn' + (c.hex === '#ffffff' ? ' white' : '') + (c.hex === '#1a1a1a' ? ' active' : '');
    b.dataset.hex = c.hex;
    b.setAttribute('aria-label', c.label);
    b.style.background = c.hex;
    b.onclick = () => setColour(c.hex);
    cBtns.appendChild(b);
  });

  function getPos(e) {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    currentStroke = { tool, colour, size, points: [p] };
    ctx.beginPath();
    ctx.arc(p.x, p.y, (tool === 'eraser' ? size * 2 : size) / 2, 0, Math.PI * 2);
    ctx.fillStyle = tool === 'eraser' ? '#ffffff' : colour;
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  function doDraw(e) {
    e.preventDefault();
    if (!drawing) return;
    const p = getPos(e);
    currentStroke.points.push(p);
    ctx.lineWidth = tool === 'eraser' ? size * 4 : size;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = tool === 'eraser' ? '#ffffff' : colour;
    ctx.globalCompositeOperation = tool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
  }

  function endDraw() {
    if (!drawing) return;
    drawing = false;
    ctx.globalCompositeOperation = 'source-over';
    if (currentStroke) { history.push(currentStroke); currentStroke = null; }
  }

  function redrawAll() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    history.forEach(stroke => {
      if (!stroke.points.length) return;
      ctx.lineWidth = stroke.tool === 'eraser' ? stroke.size * 4 : stroke.size;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = stroke.tool === 'eraser' ? '#ffffff' : stroke.colour;
      ctx.globalCompositeOperation = stroke.tool === 'eraser' ? 'destination-out' : 'source-over';
      ctx.beginPath();
      stroke.points.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
      ctx.stroke();
    });
    ctx.globalCompositeOperation = 'source-over';
  }

  function undoLast() { if (history.length) { history.pop(); redrawAll(); } }

  function clearCanvas() {
    if (history.length && !confirm('Clear the canvas?')) return;
    history = [];
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  }

  function saveCanvas() {
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width;
    tmp.height = canvas.height;
    const t = tmp.getContext('2d');
    t.fillStyle = '#ffffff';
    t.fillRect(0, 0, tmp.width, tmp.height);
    t.drawImage(canvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'my-doodle.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', doDraw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', doDraw, { passive: false });
  canvas.addEventListener('touchend', endDraw);

  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
</script>

</body>
</html>
